<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <!--
    The base href is replaced by `flutter build web --base-href=...`
    It must start and end with "/" for the router to work correctly.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- Responsive viewport — required for PWA and correct Flutter rendering -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="description" content="Aplicação companheira MeshCore — comunidade portuguesa de rádio mesh LoRa">

  <!-- PWA theme colour — matches app primary orange (#FF6B00) -->
  <meta name="theme-color" content="#FF6B00" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#FF6B00">

  <!-- Android / Chrome PWA -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Safari full-screen / standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MeshCore">

  <!-- Icons -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>MeshCore PT</title>

  <!-- Inline splash / loading style so the user sees dark bg immediately,
       before Flutter paints its first frame. -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #111111;
      height: 100%;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
