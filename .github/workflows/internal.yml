name: Build and Pre-Release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: prerelease-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build_android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve_version.outputs.version }}
      internal_sharing_url: ${{ steps.play_upload.outputs.internalSharingDownloadUrl }}
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build Android Release
        run: bash scripts/build.android.sh --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-artifacts
          path: |
            build/dist/*.aab
            build/dist/*.apk
          if-no-files-found: error

      - name: Resolve final version
        id: resolve_version
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')

          if git ls-remote --tags origin "refs/tags/v${version}" | grep -q .; then
            version="${version}-build-${{ github.run_number }}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Upload to Play Store (Internal Test)
        id: play_upload
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: pt.meshcore.lusoapp
          releaseFiles: build/dist/*.aab
          track: internal

  build_web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Run Web build script
        run: bash scripts/build.web.sh

      - name: Upload Web artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-artifacts
          path: build/dist/*-web.zip
          if-no-files-found: error

  # build_ios:
  #   runs-on: macos-latest

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v6

  #     - name: Set up Flutter
  #       uses: subosito/flutter-action@v2
  #       with:
  #         channel: stable

  #     - name: Run iOS build script
  #       run: bash scripts/build.ios.sh --release

  #     - name: Upload iOS artifact
  #       uses: actions/upload-artifact@v6
  #       with:
  #         name: ios-artifacts
  #         path: build/dist/*-ios.ipa
  #         if-no-files-found: error

  release:
    needs:
      - build_android
      - build_web
      # - build_ios
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v6
        with:
          name: android-artifacts
          path: release-assets

      - name: Download Web artifact
        uses: actions/download-artifact@v6
        with:
          name: web-artifacts
          path: release-assets

      # - name: Download iOS artifact
      #   uses: actions/download-artifact@v6
      #   with:
      #     name: ios-artifacts
      #     path: release-assets

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build_android.outputs.version }}
          name: LusoApp v${{ needs.build_android.outputs.version }}
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/*.apk
            release-assets/*.aab
            release-assets/*-web.zip
# release-assets/*-ios.ipa
