name: lusoapp
description: "MeshCore Companion App - MeshCore Portugal"
publish_to: "none"
version: 0.4.2+14

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.35.0
  permission_handler: ^12.0.1

  # Serial / USB — flutter_libserialport for Windows/Linux COM ports
  #   .so files are excluded from the Android APK via build.gradle.kts (not 16 KB page-aligned)
  #   Runtime guards in serial_transport_native.dart prevent any usage on Android
  flutter_libserialport: ^0.6.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage (Isar planned for Phase 2)
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Routing
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  image_picker: ^1.1.0

  # Cryptography (SHA-256 for hashtag channel key derivation)
  crypto: ^3.0.3

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Map
  flutter_map: ^8.1.0
  flutter_map_tile_caching: ^10.1.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Android home screen widget bridge
  home_widget: ^0.9.1

  # Timezone support (for Plan 3-3-3 scheduled notifications)
  timezone: ^0.9.0

  # Utilities
  intl: ^0.20.0
  equatable: ^2.0.7
  convert: ^3.1.2
  collection: ^1.19.1
  logger: ^2.5.0
  share_plus: ^12.0.2
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.1

  # Windows BLE — win_ble uses WinRT via BLEServer.exe subprocess.
  # Guarded by Platform.isWindows at all call sites; compiles on all platforms.
  win_ble: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

# Replace the real permission_handler_windows (which requires the NuGet package
# Microsoft.Windows.CppWinRT and fails in offline/restricted environments) with
# a pure-Dart stub.  The stub returns PermissionStatus.granted for everything;
# it is never called at runtime because all permission_handler usage in this app
# is guarded by Platform.isAndroid checks.
dependency_overrides:
  permission_handler_windows:
    path: local_packages/permission_handler_windows
  geolocator_windows:
    path: local_packages/geolocator_windows
  # flutter_map_tile_caching 10.1.1 pins objectbox ^4.1.0, but objectbox 5.x
  # is the first release with arm64 iOS 26 simulator slices. Pinned to 5.0.4
  # because 5.1+ requires flat_buffers 25.x which conflicts with FMTC.
  objectbox: 5.0.4
  objectbox_flutter_libs: 5.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
