name: lusoapp
description: "MeshCore Companion App - MeshCore Portugal"
publish_to: "none"
version: 0.4.1+11

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.35.0
  permission_handler: ^11.3.1

  # Serial / USB — usb_serial for Android USB OTG (Phase 2)
  #   flutter_libserialport planned for Windows/Linux/macOS COM ports (Phase 2)
  #   flutter_libserialport removed — its .so does not support 16 KB page size

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage (Isar planned for Phase 2)
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Routing
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  image_picker: ^1.1.0

  # Cryptography (SHA-256 for hashtag channel key derivation)
  crypto: ^3.0.3

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Map
  flutter_map: ^8.1.0
  flutter_map_tile_caching: ^10.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # Android home screen widget bridge
  home_widget: ^0.6.0

  # Timezone support (for Plan 3-3-3 scheduled notifications)
  timezone: ^0.9.0

  # Utilities
  intl: ^0.20.0
  equatable: ^2.0.7
  convert: ^3.1.2
  collection: ^1.19.1
  logger: ^2.5.0
  share_plus: ^12.0.1
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

# Replace the real permission_handler_windows (which requires the NuGet package
# Microsoft.Windows.CppWinRT and fails in offline/restricted environments) with
# a pure-Dart stub.  The stub returns PermissionStatus.granted for everything;
# it is never called at runtime because all permission_handler usage in this app
# is guarded by Platform.isAndroid checks.
dependency_overrides:
  permission_handler_windows:
    path: local_packages/permission_handler_windows
  geolocator_windows:
    path: local_packages/geolocator_windows

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
